# network structures
network_g:
  type: RWKVIR
  upscale: 4
  in_chans: 3
  img_size: 64
  img_range: 1.
  depths: [4, 4, 6, 6]
  patch_size: 16
  embed_dim: 48
  mlp_ratio: 1
  channel_gamma: 0.25
  shift_pixel: 1
  hidden_rate: 4
  init_mode: 'fancy'
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: /data/model/tql/resyn/experiments/RWKVIR_CSR_JPEGq10_48_low_param_tidu_4466_rd_fxjjhebing/models/net_g_195000.pth
  strict_load_g: false
val:
  val_freq: !!float 200
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true



# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
