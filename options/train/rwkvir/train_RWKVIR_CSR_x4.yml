# general settings for image SR training
name: RWKVIR_CSR_JPEGq10_48_low_param_tidu_4466_rd_fxjjhebing_xuexi_xita
model_type: RWKVIRModel
scale: 4
num_gpu: 1
manual_seed: 10

# dataset and data loader settings
datasets:
  train:
    task: SR
    name: DF2K
    type: PairedImageDataset
    dataroot_gt:
      - /data/dataset/tql/DF2K_train_HR/
    dataroot_lq:
      - /data/dataset/tql/UCSR_Datasets/Train/LR_JPEG/10
    filename_tmpl: '{}_jpeg_10'
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 16
    batch_size_per_gpu: 32
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  # val:
  #   name: Urban100
  #   type: PairedImageDataset
  #   dataroot_gt: /data/dataset/tql/UCSR_Datasets/Test/Manga109/HR/
  #   dataroot_lq: /data/dataset/tql/UCSR_Datasets/Test/Manga109/LR_JPEG/10/
  #   filename_tmpl: '{}'
  #   io_backend:
  #     type: disk
  val_1:  # the 1st test dataset
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /data/dataset/tql/UCSR_Datasets/Test/Set5/HR/
    dataroot_lq: /data/dataset/tql/UCSR_Datasets/Test/Set5/LR_JPEG/10
    filename_tmpl: '{}'
    io_backend:
      type: disk

  val_2:  # the 2nd test dataset
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /data/dataset/tql/UCSR_Datasets/Test/Set14/HR/
    dataroot_lq: /data/dataset/tql/UCSR_Datasets/Test/Set14/LR_JPEG/10
    filename_tmpl: '{}'
    io_backend:
      type: disk
      
  val_3:  # the 3rd test dataset
    name: B100
    type: PairedImageDataset
    dataroot_gt: /data/dataset/tql/UCSR_Datasets/Test/BSD100/HR/
    dataroot_lq: /data/dataset/tql/UCSR_Datasets/Test/BSD100/LR_JPEG/10
    filename_tmpl: '{}'
    io_backend:
      type: disk

  val_4:  # the 4th test dataset
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: /data/dataset/tql/UCSR_Datasets/Test/Urban100/HR/
    dataroot_lq: /data/dataset/tql/UCSR_Datasets/Test/Urban100/LR_JPEG/10
    filename_tmpl: '{}'
    io_backend:
      type: disk

  val_5:  # the 5th test dataset
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: /data/dataset/tql/UCSR_Datasets/Test/Manga109/HR/
    dataroot_lq: /data/dataset/tql/UCSR_Datasets/Test/Manga109/LR_JPEG/10
    filename_tmpl: '{}'
    io_backend:
      type: disk
# network structures
network_g:
  type: RWKVIR
  upscale: 4
  in_chans: 3
  img_size: 64
  img_range: 1.
  depths: [4, 4, 6, 6]
  patch_size: 16
  embed_dim: 48
  mlp_ratio: 1
  channel_gamma: 0.25
  shift_pixel: 1
  hidden_rate: 4
  init_mode: 'fancy'
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: ~
  strict_load_g: False
  resume_state: ~

# training settings
train:
  optim_g:
    type: Adam
    #lr: !!float 2e-4
    lr: !!float 4e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [ 150000, 250000, 275000]
    #milestones: [5000, 10000, 15000, 20000，25000，30000，35000]
    gamma: 0.5

  total_iter: 400000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
# validation settings
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true



# logging settings
logger:
  print_freq: 200
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
